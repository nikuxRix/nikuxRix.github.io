<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>kinnnikuAi</title>

<style>

/* reset */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg:#ffffff;
    --sidebar:#f7f7f8;
    --chat:#ffffff;
    --text:#111827;
    --input:#f3f4f6;
    --border:#e5e7eb;
    --user:#10a37f;
    --ai:#f3f4f6;
}

body.dark{

    --bg:#212121;
    --sidebar:#171717;
    --chat:#212121;
    --text:#ffffff;
    --input:#2f2f2f;
    --border:#2f2f2f;
    --user:#10a37f;
    --ai:#2a2a2a;
}

body{

    background:var(--bg);
    color:var(--text);

    font-family:sans-serif;

    height:100vh;

    display:flex;

    overflow:hidden;

    transition:
    background 0.3s,
    color 0.3s;
}

/* sidebar */

.sidebar{

    width:250px;

    background:var(--sidebar);

    border-right:
    1px solid var(--border);

    padding:15px;

    display:flex;
    flex-direction:column;

    transition:
    background 0.3s,
    border-color 0.3s;
}

.new-chat{

    border:none;

    background:var(--input);

    color:var(--text);

    padding:14px;

    border-radius:14px;

    cursor:pointer;

    font-size:15px;

    margin-bottom:20px;

    transition:
    opacity 0.2s,
    background 0.3s;
}

.new-chat:hover{
    opacity:0.8;
}

.chat-history{

    display:flex;
    flex-direction:column;

    gap:10px;
}

.history-item{

    padding:12px;

    border-radius:12px;

    cursor:pointer;

    transition:
    background 0.2s;
}

.history-item:hover{

    background:rgba(128,128,128,0.1);
}

/* main */

.main{

    flex:1;

    display:flex;
    flex-direction:column;
}

/* topbar */

.topbar{

    height:60px;

    border-bottom:
    1px solid var(--border);

    display:flex;

    align-items:center;

    padding:0 20px;

    transition:
    border-color 0.3s;
}

.logo{

    font-size:20px;
    font-weight:bold;
}

/* messages */

.messages{

    flex:1;

    overflow-y:auto;

    padding:30px;

    display:flex;
    flex-direction:column;

    gap:20px;
}

.message{

    display:flex;

    animation:fade 0.3s ease;
}

.message-content{

    max-width:700px;

    padding:18px;

    border-radius:18px;

    line-height:1.7;

    white-space:pre-wrap;

    transition:
    background 0.3s,
    color 0.3s;
}

.user{

    justify-content:flex-end;
}

.user .message-content{

    background:var(--user);

    color:white;
}

.ai .message-content{

    background:var(--ai);
}


.input-area{

    padding:20px;

    border-top:
    1px solid var(--border);

    display:flex;

    justify-content:center;

    transition:
    border-color 0.3s;
}

.input-box{

    width:100%;
    max-width:850px;

    background:var(--input);

    border:
    1px solid var(--border);

    border-radius:18px;

    padding:10px;

    display:flex;

    align-items:center;

    gap:10px;

    transition:
    background 0.3s,
    border-color 0.3s;
}

textarea{

    flex:1;

    background:transparent;

    border:none;

    outline:none;

    resize:none;

    color:var(--text);

    font-size:16px;

    max-height:150px;

    transition:
    color 0.3s;
}

.send-btn{

    width:45px;
    height:45px;

    border:none;

    border-radius:12px;

    background:var(--user);

    color:white;

    font-size:20px;

    cursor:pointer;

    transition:
    transform 0.2s,
    opacity 0.2s;
}

.send-btn:hover{

    transform:scale(1.05);
}

/* typing animation */

.typing{

    display:flex;

    gap:5px;

    align-items:center;
}

.dot{

    width:8px;
    height:8px;

    border-radius:50%;

    background:gray;

    animation:bounce 1s infinite;
}

.dot:nth-child(2){

    animation-delay:0.2s;
}

.dot:nth-child(3){

    animation-delay:0.4s;
}

@keyframes bounce{

    0%,80%,100%{

        transform:scale(0.8);
        opacity:0.5;
    }

    40%{

        transform:scale(1.3);
        opacity:1;
    }
}

@keyframes fade{

    from{

        opacity:0;
        transform:translateY(10px);
    }

    to{

        opacity:1;
        transform:translateY(0);
    }
}


@media(max-width:800px){

    .sidebar{
        display:none;
    }

    .messages{
        padding:15px;
    }
}

</style>
</head>
<body>

<div class="sidebar">

    <button class="new-chat">
        + 新しいチャット
    </button>

    <div class="chat-history">

        <div class="history-item">
            AIについて
        </div>

        <div class="history-item">
            HTML学習
        </div>

        <div class="history-item">
            JavaScript
        </div>

    </div>

</div>

<div class="main">

    <div class="topbar">

        <div class="logo">
            kinnnikuAIPro
        </div>

    </div>

    <div class="messages" id="messages">

        <div class="message ai">

            <div class="message-content">
こんにちは!!
            </div>

        </div>

    </div>

    <div class="input-area">

        <div class="input-box">

            <textarea
            id="input"
            rows="1"
            placeholder="メッセージを送信"></textarea>

            <button
            class="send-btn"
            onclick="sendMessage()">
                ➤
            </button>

        </div>

    </div>

</div>

<script>


function applyTheme(){

    const prefersDark =
    window.matchMedia(
    "(prefers-color-scheme: dark)"
    ).matches;

    if(prefersDark){

        document.body
        .classList.add("dark");

    }else{

        document.body
        .classList.remove("dark");
    }
}

applyTheme();

window.matchMedia(
"(prefers-color-scheme: dark)"
).addEventListener(
"change",
applyTheme
);


function aiReply(text){

    text = text.toLowerCase();

    const dictionary = {

        "プログラミング":
        "プログラミングとは、アプリやゲーム、Webサイトなどを作るために必要なものだよ 💻",

        "html":
        "HTMLはWebサイトの骨組みを作る言語！",

        "css":
        "CSSはWebサイトのデザインを作る言語！",

        "javascript":
        "JavaScriptはWebサイトを動かす言語！",

        "python":
        "PythonはAI開発や自動化でも人気のプログラミング言語！",

        "ai":
        "AIは人間みたいに考えるコンピューター技術！",

        "cpu":
        "CPUはコンピューターの頭脳！",

        "gpu":
        "GPUは画像処理やAI処理が得意なパーツ！",

        "discord":
        "Discordは通話やチャットができる人気サービス！",

        "linux":
        "Linuxはサーバーでも人気のOS！",

        "react":
        "Reactは人気のWebフレームワーク！"
    };

    for(let key in dictionary){

        if(text.includes(key)){

            return dictionary[key];
        }
    }

    if(
    text.includes("こんにちは")
    ||
    text.includes("こん")
    ){

        return "こんにちは！😎";
    }

    if(
    text.includes("おはよう")
    ){

        return "おはよう ☀️";
    }

    if(
    text.includes("こんばんは")
    ){

        return "こんばんは 🌙";
    }

    if(
    text.includes("疲れた")
    ){

        return "今日はゆっくり休むのも大事 😌";
    }

    const randomReplies = [

        "それ面白そう 👀",

        "もっと詳しく聞きたい 😎",

        "なるほどなー",

        "それ結構好きかも",

        "なんかワクワクする話やな 🔥",

        "それ作れたら楽しそう",

        "発想いいな 😏",

        "めっちゃ気になる",

        "それ調べたくなるやつや",

        "いい感じやな ✨"
    ];

    return randomReplies[
        Math.floor(
            Math.random()
            * randomReplies.length
        )
    ];
}


function addMessage(text,type){

    const messages =
    document.getElementById("messages");

    const div =
    document.createElement("div");

    div.classList.add("message");
    div.classList.add(type);

    div.innerHTML = `
        <div class="message-content">
            ${text}
        </div>
    `;

    messages.appendChild(div);

    messages.scrollTop =
    messages.scrollHeight;
}


function typeMessage(text,type){

    const messages =
    document.getElementById("messages");

    const div =
    document.createElement("div");

    div.classList.add("message");
    div.classList.add(type);

    const content =
    document.createElement("div");

    content.classList.add("message-content");

    div.appendChild(content);

    messages.appendChild(div);

    let index = 0;

    const speed = 25;

    const interval = setInterval(()=>{

        content.innerHTML +=
        text.charAt(index);

        index++;

        messages.scrollTop =
        messages.scrollHeight;

        if(index >= text.length){

            clearInterval(interval);
        }

    },speed);
}


function showTyping(){

    const messages =
    document.getElementById("messages");

    const div =
    document.createElement("div");

    div.classList.add("message","ai");

    div.id = "typing";

    div.innerHTML = `
    <div class="message-content">
        <div class="typing">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
    `;

    messages.appendChild(div);

    messages.scrollTop =
    messages.scrollHeight;
}

function removeTyping(){

    const typing =
    document.getElementById("typing");

    if(typing){

        typing.remove();
    }
}


function sendMessage(){

    const input =
    document.getElementById("input");

    const text =
    input.value.trim();

    if(text === "") return;

    addMessage(text,"user");

    input.value = "";

    showTyping();

    setTimeout(()=>{

        removeTyping();

        const reply =
        aiReply(text);

        typeMessage(reply,"ai");

    },1500 + Math.random() * 2000);
}


document
.getElementById("input")
.addEventListener(
"keydown",
(e)=>{

    if(
    e.key === "Enter"
    &&
    !e.shiftKey
    ){

        e.preventDefault();

        sendMessage();
    }
});

</script>

</body>
    </html>
