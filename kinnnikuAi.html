<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kinnnikuAi - Premium</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #202124;
            --ai-bubble-bg: #f8f9fa;
            --user-bubble-bg: #e8f0fe;
            --accent-color: #1a73e8;
            --border-color: #e0e0e0;
            --gradient-icon: linear-gradient(135deg, #4285f4, #a142f4, #f44265);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1c1e;
                --text-main: #e2e2e2;
                --ai-bubble-bg: #212327;
                --user-bubble-bg: #2d2f34;
                --border-color: #444746;
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-mark {
            width: 24px;
            height: 24px;
            background: var(--gradient-icon);
            border-radius: 50%;
        }

        .title { font-weight: 600; font-size: 1.1rem; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .message-list {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .row { display: flex; gap: 16px; animation: slideUp 0.3s ease-out; }
        .row.user { justify-content: flex-end; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; }
        }

        .icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gradient-icon);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }

        .content {
            max-width: 80%;
            line-height: 1.6;
            padding: 12px 20px;
            border-radius: 18px;
            white-space: pre-wrap;
        }

        .ai .content { background: var(--ai-bubble-bg); border-top-left-radius: 4px; }
        .user .content { background: var(--user-bubble-bg); border-top-right-radius: 4px; }

        .input-section { padding: 24px; }

        .input-outer {
            max-width: 800px;
            margin: 0 auto;
            background: var(--ai-bubble-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            display: flex;
            padding: 8px 12px 8px 24px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1rem;
        }

        .send-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent-color);
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<header>
    <div class="logo-mark"></div>
    <div class="title">kinnnikuAi</div>
</header>

<div id="chat-container">
    <div class="message-list" id="message-list">
        <div class="row ai">
            <div class="icon">★</div>
            <div class="content">何かお手伝いできることはありますか？</div>
        </div>
    </div>
</div>

<div class="input-section">
    <div class="input-outer">
        <input type="text" id="user-input" placeholder="メッセージを入力..." autocomplete="off">
        <button id="send-btn">➤</button>
    </div>
</div>

<script>
    const messageList = document.getElementById('message-list');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const chatContainer = document.getElementById('chat-container');

    const responses = {
        programming: "プログラミングを知りたいのですかー。素敵ですね！具体的にどの言語や、どのようなものを作ってみたいか決まって〜る？ 💪",
        greeting: "こんにちは。私はkinnnikuAiと言います。分からない事が聞きたいです〜 💪",
        kinnniku: "kinnnikuAiでーす!!どうしましたか〜 💪",
        toha: "検索できませんでした... 筋力が足りないのかも。 💦",
        nani: "データセンターにアクセスできません。今はプロテインを飲んでます。 🥤",
        osiete: "本物のkinnnikuに聞こう!! 💪🔥",
        hima: "あらら..暇なのね〜 暇なら一緒にトレーニング（勉強）しようね！ ✨",
        default: [
            "その点について詳しくお聞かせいただけますか？ 💪",
            "承知いたしました。お手伝いできることがあれば教えてください。",
            "興味深いお話ですね！パワー！！ 💪"
        ]
    };

    function appendMessage(type) {
        const row = document.createElement('div');
        row.className = `row ${type}`;
        if (type === 'ai') {
            row.innerHTML = `<div class="icon">✦</div><div class="content"></div>`;
        } else {
            row.innerHTML = `<div class="content"></div>`;
        }
        messageList.appendChild(row);
        return row.querySelector('.content');
    }

    async function streamResponse(element, text) {
        const cursor = document.createElement('span');
        cursor.className = 'typing-cursor';
        element.appendChild(cursor);

        for (let i = 0; i < text.length; i++) {
            cursor.before(text[i]);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await new Promise(r => setTimeout(r, 30));
        }
        cursor.remove();
    }

    async function processSend() {
        const inputVal = userInput.value.trim();
        if (!inputVal || sendBtn.disabled) return;

        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;

        const userBubble = appendMessage('user');
        userBubble.innerText = inputVal;
        chatContainer.scrollTop = chatContainer.scrollHeight;

        await new Promise(r => setTimeout(r, 600));
        
        const aiBubble = appendMessage('ai');
        let reply = "";

        // 判定ロジック
        if (inputVal.includes("プログラミング")) {
            reply = responses.programming;
        } else if (inputVal.includes("こんにちは")) {
            reply = responses.greeting;
        } else if (inputVal.includes("kinnniku")) {
            reply = responses.kinnniku;
        } else if (inputVal.includes("とは")) {
            reply = responses.toha;
        } else if (inputVal.includes("なに")) {
            reply = responses.nani;
        } else if (inputVal.includes("教えて")) {
            reply = responses.osiete;
        } else if (inputVal.includes("ひま") || inputVal.includes("暇")) {
            reply = responses.hima;
        } else {
            const def = responses.default;
            reply = def[Math.floor(Math.random() * def.length)];
        }

        await streamResponse(aiBubble, reply);

        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
    }

    sendBtn.addEventListener('click', processSend);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') processSend();
    });
</script>
</body>
</html>
