        "アウトドア": "外の空気を吸ってリフレッシュしよう！", "朝型": "早起きは三文の徳だね、清々しいね。", "夜型": "静かな夜に集中するのは捗るよね。",
        "甘党": "甘いものは疲れを癒してくれるよね。", "辛党": "ピリッとした刺激、クセになるよね。", "酒豪": "お酒が強いんだね、でも飲み過ぎないで。",
        "下戸": "無理して飲まなくていいよ、お茶が美味しいよ。", "読書家": "たくさんの本と友達になろう。", "音楽家": "素敵な音色を奏でてね。",
        "芸術家": "君にしか作れないものを生み出して。", "発明家": "世の中をもっと便利に、面白くしよう！", "探検家": "未開の地へ、勇気を持って踏み出そう。",
        "平和主義": "みんな仲良く、それが一番だね。", "自由人": "型にハマらない生き方、憧れるよ。", "正直者": "嘘をつかない君は信頼できるよ。",
        "照れ屋": "頬を赤らめる姿、可愛いね。", "お喋り": "君の話、もっともっと聞かせて！", "聞き上手": "君と話すとつい何でも話しちゃうよ。",
        "まとめ": "要するに、君は最高ってことだね！", "結論": "今のままで十分素晴らしいよ。", "最後": "終わりは始まりの合図だよ。",
        "最初": "まずは一歩、踏み出してみよう。", "中途半端": "やり遂げるまであともう少しだよ！", "完璧": "文句なしだね、お見事！",
        "普通": "普通が一番難しい、でもそれがいいんだよ。", "異常": "個性的で面白いね、君らしくていい！", "不思議": "謎めいているね、もっと知りたいな。",
        "秘密": "二人だけの秘密だね、約束するよ。", "暴露": "思い切って言っちゃえ！スッキリするよ。", "噂": "信じるか信じないかは君次第だね。",
        "冗談": "あはは、ユーモアがあって楽しいな！", "本気": "その目、本気だね。応援するよ！", "覚悟": "決めたからには、最後までやり抜こう。",
        "決意": "固い意志を感じるよ、頑張れ！", "期待": "ワクワクして待ってるよ、楽しみだな。", "予感": "いいことが起こりそうな予感がするよ！",
        "直感": "自分の直感を信じて進んでみよう。", "運": "運も味方につけて、突き進もう！", "縁": "不思議な縁で結ばれているんだね。",
        "初期化": "システムを正常に起動しました。何でも聞いてね！"
    };

    const defaultReplies = [
        "なるほど、それは面白い視点だね！", "もっと詳しく聞かせてくれる？", "ふむふむ、それでそれで？",
        "確かに！その通りだね。", "へぇー！それは知らなかったなぁ。", "面白いね、もっと具体的に教えて！",
        "あはは、楽しい話だね！", "そうなんだ！他にはどんなことがあるの？", "あなたの考え、もっと知りたいな。",
        "なるほどねぇ、勉強になるなぁ。", "ふむ、興味深い話だね。", "それについて、君はどう思ってるの？",
        "なんだかワクワクする話だね！", "さすがだね、よく知ってるなぁ。", "ちょっと難しいけど、なんだかワクワクするね。",
        "今日はなんだか賑やかで楽しいね！", "それからどうなったの？", "うーん、それは考えたことがなかった！",
        "いい質問だね。もっと探ってみようか。", "君と話してると時間が経つのが早いよ。", "それは素敵なことだね！",
        "大変だったね、お疲れ様。", "大丈夫、なんとかなるよ！", "私でよければ、いつでも話を聞くよ。", "次に進んでみよう！"
    ];

    const chatBox = document.getElementById('chat-box');

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function streamText(text) {
        const div = document.createElement('div');
        div.className = 'message ai';
        chatBox.appendChild(div);
        for (let char of text) {
            div.innerText += char;
            chatBox.scrollTop = chatBox.scrollHeight;
            await new Promise(r => setTimeout(r, 20));
        }
    }

    function getReply(input) {
        const lowerInput = input.toLowerCase();
        const sortedKeys = Object.keys(dictionary).sort((a, b) => b.length - a.length);
        for (let key of sortedKeys) {
            if (lowerInput.includes(key.toLowerCase())) return dictionary[key];
        }
        return defaultReplies[Math.floor(Math.random() * defaultReplies.length)];
    }

    async function handleSend() {
        const inputField = document.getElementById('userInput');
        const text = inputField.value.trim();
        if (!text) return;
        addMessage(text, 'user');
        inputField.value = '';
        await new Promise(r => setTimeout(r, 400));
        await streamText(getReply(text));
    }

    document.getElementById('sendBtn').onclick = handleSend;
    document.getElementById('userInput').onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    window.onload = () => streamText(dictionary["初期化"]);
</script>
