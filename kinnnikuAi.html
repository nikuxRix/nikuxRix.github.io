<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium AI Interface</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #202124;
            --ai-bubble-bg: #f8f9fa;
            --user-bubble-bg: #e8f0fe;
            --accent-color: #1a73e8;
            --border-color: #e0e0e0;
            --gradient-icon: linear-gradient(135deg, #4285f4, #a142f4, #f44265);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1c1e;
                --text-main: #e2e2e2;
                --ai-bubble-bg: #212327;
                --user-bubble-bg: #2d2f34;
                --border-color: #444746;
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(var(--bg-color), 0.8);
            backdrop-filter: blur(10px);
        }

        .logo-mark {
            width: 24px;
            height: 24px;
            background: var(--gradient-icon);
            border-radius: 50%;
            filter: drop-shadow(0 0 4px rgba(66, 133, 244, 0.4));
        }

        .title { font-weight: 600; font-size: 1.1rem; letter-spacing: -0.02em; }

      
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            scroll-behavior: smooth;
        }

        .message-list {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .row { display: flex; gap: 16px; animation: slideUp 0.4s ease-out; }
        .row.user { justify-content: flex-end; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gradient-icon);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .content {
            max-width: 80%;
            line-height: 1.6;
            font-size: 1rem;
            white-space: pre-wrap;
            padding: 12px 20px;
            border-radius: 18px;
        }

        .ai .content { background: var(--ai-bubble-bg); border-top-left-radius: 4px; }
        .user .content { background: var(--user-bubble-bg); border-top-right-radius: 4px; }

      
        .input-section {
            padding: 24px;
            background: linear-gradient(transparent, var(--bg-color) 40%);
        }

        .input-outer {
            max-width: 800px;
            margin: 0 auto;
            background: var(--ai-bubble-bg);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            display: flex;
            align-items: center;
            padding: 8px 12px 8px 24px;
            transition: 0.3s cubic-bezier(0.2, 0, 0, 1);
        }

        .input-outer:focus-within {
            border-color: transparent;
            box-shadow: 0 0 0 2px var(--accent-color), 0 4px 12px rgba(0,0,0,0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1rem;
            padding: 10px 0;
        }

        .send-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
        }

        .send-btn:hover { transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.4; cursor: default; }

        
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent-color);
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

  <header>
    <div class="logo-mark"></div>
    <div class="title">kinnnikuAi</div>
</header>

<div id="chat-container">
    <div class="message-list" id="message-list">
        <div class="row ai">
            <div class="icon">★</div>
            <div class="content">何かお手伝いできることはありますか？</div>
        </div>
    </div>
</div>

<div class="input-section">
    <div class="input-outer">
        <input type="text" id="user-input" placeholder="メッセージを入力してください..." autocomplete="off">
        <button id="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
    const messageList = document.getElementById('message-list');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const chatContainer = document.getElementById('chat-container');

    
    const responses = {
        programming: "プログラミングを知りたいのですかー。素敵ですね！具体的にどの言語や、どのようなものを作ってみたいか決まっていますか？",
        greeting: "こんにちは。私はkinnnikuAiと言います。分からない事を聞かせて下さい",
        kinnniku: "kinnnikuAiでーす!!どうしましたか〜",
        toha: "検索できませんでした",
        nani: "データセンターにアクセスできません。",
        osiete: 
        
        default: [
            "その点について詳しくお聞かせいただけますか？",
            "承知いたしました。お手伝いできることがあれば教えてください。",
            "興味深いお話ですね。さらに具体的に教えていただけると、より良い提案ができます。"
        ]
    };

    function appendMessage(type) {
        const row = document.createElement('div');
        row.className = `row ${type}`;
        if (type === 'ai') {
            row.innerHTML = `<div class="icon">✦</div><div class="content"></div>`;
        } else {
            row.innerHTML = `<div class="content"></div>`;
        }
        messageList.appendChild(row);
        return row.querySelector('.content');
    }

    async function streamResponse(element, text) {
        const cursor = document.createElement('span');
        cursor.className = 'typing-cursor';
        element.appendChild(cursor);

        for (let i = 0; i < text.length; i++) {
            cursor.before(text[i]);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            await new Promise(r => setTimeout(r, Math.random() * 25 + 15));
        }
        cursor.remove();
    }

    async function processSend() {
        const inputVal = userInput.value.trim();
        if (!inputVal || sendBtn.disabled) return;

        // UIをロック
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;

        // ユーザーの発言
        const userBubble = appendMessage('user');
        userBubble.innerText = inputVal;
        chatContainer.scrollTop = chatContainer.scrollHeight;

        
        await new Promise(r => setTimeout(r, 800));
        
        const aiBubble = appendMessage('ai');
        let reply = "";

        if (inputVal.includes("プログラミング")) {
            reply = responses.programming;
            } else if (inputVal.includes("こんにちは")) {
            reply = responses.greeting;
            } else if (inputVal.includes("kinnniku")) {
            reply = responses.kinnniku;
            } else if (inputVal.includes("とは")) {
            reply = responses.toha;
            } else if (inputVal.includes("なに")) {
            reply = responses.nani;
            } else if (inputVal.includes("教えて")) {
            reply = responses.osiete;
            } else if (inputVal.includes("ひま,暇")) {
            reply = responses.greeting;
            } else if (inputVal.includes("こんにちは")) {
            reply = responses.greeting;
            } else if (inputVal.includes("こんにちは")) {
            reply = responses.greeting;
            } else if (inputVal.includes("こんにちは")) {
            reply = responses.greeting;
            } else if (inputVal.includes("こんにちは")) {
            reply = responses.greeting;
            } else if (inputVal.includes("こんにちは")) {
            reply = responses.greeting;
            } else if (inputVal.includes("こんにちは")) {
            reply = responses.greeting;
            } else if (inputVal.includes("こんにちは")) {
            reply = responses.greeting;
            } else if (inputVal.includes("こんにちは")) {
            reply = responses.greeting;
        } else {
            const def = responses.default;
            reply = def[Math.floor(Math.random() * def.length)];
        }

        await streamResponse(aiBubble, reply);

        // ロック解除
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
    }

    sendBtn.addEventListener('click', processSend);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') processSend();
    });
</script>

</body>
  </html>
