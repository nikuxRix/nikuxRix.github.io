    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #050505;
            --ai-msg-bg: #e4e6eb;
            --user-msg-bg: #0084ff;
            --user-msg-text: #ffffff;
            --input-bg: #f0f2f5;
            --border-color: #eee;
            --link-color: #0066cc;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #18191a;
                --container-bg: #242526;
                --text-color: #e4e6eb;
                --ai-msg-bg: #3a3b3c;
                --user-msg-bg: #0073e6;
                --user-msg-text: #ffffff;
                --input-bg: #3a3b3c;
                --border-color: #3e4042;
                --link-color: #4dbbff;
            }
        }

        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; transition: background 0.3s; }
        #chat-container { width: 95%; max-width: 450px; height: 85vh; background: var(--container-bg); display: flex; flex-direction: column; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border-radius: 20px; overflow: hidden; }
        #status-bar { font-size: 11px; padding: 5px; text-align: center; background: var(--input-bg); color: #888; height: 15px; visibility: hidden; }
        #chat-log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .msg { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; max-width: 75%; animation: fadeIn 0.2s ease; }
        .user { align-self: flex-end; background: var(--user-msg-bg); color: var(--user-msg-text); border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background-color: var(--ai-msg-bg); color: var(--text-color); border-bottom-left-radius: 4px; }

        a { color: var(--link-color); text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        a:visited { color: var(--link-color); }

        /* ドット点滅アニメーション */
        .dot-flashing { position: relative; width: 6px; height: 6px; border-radius: 5px; background-color: #888; color: #888; animation: dotFlashing 1s infinite linear alternate; margin: 10px 25px; display: none; }
        @keyframes dotFlashing { 0% { background-color: #888; } 50%, 100% { background-color: #ccc; } }

        .input-area { display: flex; padding: 15px; background: var(--container-bg); border-top: 1px solid var(--border-color); }
        input { flex: 1; padding: 12px 20px; border: none; background: var(--input-bg); color: var(--text-color); border-radius: 25px; outline: none; }
        .send-btn { margin-left: 10px; background: var(--user-msg-bg); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; transition: transform 0.1s; }
        .send-btn:active { transform: scale(0.9); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="メッセージを入力..." autocomplete="off" onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>

    function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = "";

        const statusBar = document.getElementById('status-bar');
        const dots = document.getElementById('typing-dots');
        statusBar.style.visibility = 'visible';
        dots.style.display = 'block';

        setTimeout(() => {
            statusBar.style.visibility = 'hidden';
            dots.style.display = 'none';

            let response = "";
            if (text.includes("ニュース")) {
                response = "ニュースをお探しですか？こちらからどうぞ。<br><a href='https://news.yahoo.co.jp/' target='_blank'>Yahoo!ニュース</a>";
            } else if (text.includes("時間")) {
                response = `現在の時刻は ${new Date().toLocaleTimeString()} です。`;
            } else if (text.includes("計算")) {
                const formula = text.replace(/[^0-9+\-*/().]/g, "");
                try { response = `計算結果は ${eval(formula)} です。`; } catch { response = "計算式を確認してください。"; }
            } else {
                const foundKey = Object.keys(dictionary).find(key => text.includes(key));
                response = foundKey ? dictionary[foundKey] : "なるほど、面白いですね！もっと聞かせてください。";
            }

            addMessage(response, 'ai');
        }, 2000); 
    }

    function addMessage(text, sender) {
        const log = document.getElementById('chat-log');
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerHTML = text; 
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }
